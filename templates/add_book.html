<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<form method="post">

  <div class="top">
    <h1>MyLibrary: Add Book</h1>
    <div class="actions">
        <a class="btn btn-primary" href="/">Back to Library</a>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Publisher</th>
        <th>Pages</th>
      </tr>
    </thead>
    <tbody>
        
      <tr>
        <td><textarea name="title" id="title" rows="1" cols="20"></textarea></td>
        <td><textarea name="author" id="author" rows="1" cols="20"></textarea></td>
        <td><textarea name="publisher" id="publisher" rows="1" cols="20"></textarea></td>
        <td><textarea name="pages" id="pages" rows="1" cols="20"></textarea></td>
      </tr>
    </tbody>
  </table>






  <div class="actions">
    <button type="submit" class="btn btn-primary">Save Book</button>
    <a class="btn btn-primary" href="/">Back to Library</a>
  </div>
</form>
</body>
</html>
