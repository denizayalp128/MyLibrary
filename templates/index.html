<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="top">
    <h1>MyLibrary</h1>
    <div class="actions">
      <a class="btn btn-primary" href="/add_book">+ Add Book</a>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search books..." />
  </div>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Publisher</th>
        <th>Pages</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="book-list">
      {% if books %}
        {% for book in books %}
          <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.publisher }}</td>
            <td>{{ book.pages }}</td>
            <td><span class="status-badge status-{{ book.status }}">{{ book.status | capitalize }}</span></td>
            <td><a class="btn btn-primary" href="{{ url_for('edit_book', book_id=book.id) }}">Edit</a></td>
          </tr>
        {% endfor %}
      {% else %}
        <tr class="empty-row">
          <td colspan="6" class="empty">No books yet. Add one to get started.</td>
        </tr>
      {% endif %}
    </tbody>
  </table>
</body>
</html>
